<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#548a2e",
                        "background-light": "#f7f8f6",
                        "background-dark": "#181e14",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .handwritten {
            font-family: "ZCOOL XiaoWei", "Plus Jakarta Sans", cursive;
        }

        .paper-texture {
            background-color: #fdfbf7;
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 10px 10px;
        }

        .sketch-arrow {
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.1));
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden">
    <div class="relative h-screen w-full overflow-hidden">
        <!-- Background: Simulated Photo Cleaning Screen -->
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover filter blur-sm brightness-75"
                data-alt="A cozy scene of stacked polaroid photos on a wooden table"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAASS-dseqSZW7BulML8db3xxQ7RhIta8aEco7xIJQtWz5KE5-CQluLC7lyrp4hgAv4DKtHgkU01THtIgZBxSJA3w5yr4AAK8NMRxwNs_olkt60iWYnAvjW2lWzto_Qb2z4LQezFVFWE8O_ZDszq_Rqp3oLswrKI9H6VIS8v5fnCjAgXqPly4Q-_lmYvA5-4A3lPEg8-DlAW-aFQzSdiVKQk7VYSiXMc-wDNYegRSEE3CqQQ-hdW_o8X9e6WIHjegfPWQO8W2o1dqwU" />
        </div>
        <!-- Semi-transparent Dark Overlay -->
        <div
            class="absolute inset-0 z-10 bg-black/50 backdrop-blur-[2px] flex flex-col items-center justify-between py-12 px-6">
            <!-- Top Instructions -->
            <div class="text-center mt-8">
                <span
                    class="inline-block px-4 py-1 rounded-full bg-primary/20 text-white border border-white/20 text-sm mb-2">手势操作指南</span>
                <h1 class="text-white text-3xl font-bold tracking-tight">轻松整理您的回忆</h1>
            </div>
            <!-- Central Scrapbook Interaction Guide -->
            <div class="relative w-full max-w-md aspect-square flex items-center justify-center">
                <!-- Center Focus Area -->
                <div
                    class="w-48 h-64 bg-white/10 border-2 border-dashed border-white/40 rounded-xl relative flex items-center justify-center">
                    <span class="material-symbols-outlined text-white/50 text-5xl">photo_library</span>
                    <!-- Up Arrow & Label -->
                    <div class="absolute -top-16 left-1/2 -translate-x-1/2 flex flex-col items-center">
                        <span class="text-white text-lg font-bold handwritten mb-1">上滑高光</span>
                        <span class="material-symbols-outlined text-white text-4xl sketch-arrow">north</span>
                    </div>
                    <!-- Down Arrow & Label -->
                    <div class="absolute -bottom-16 left-1/2 -translate-x-1/2 flex flex-col items-center">
                        <span class="material-symbols-outlined text-white text-4xl sketch-arrow">south</span>
                        <span class="text-white text-lg font-bold handwritten mt-1">下滑跳过</span>
                    </div>
                    <!-- Left Arrow & Label -->
                    <div class="absolute -left-20 top-1/2 -translate-y-1/2 flex items-center">
                        <div class="flex flex-col items-end mr-2">
                            <span class="text-white text-lg font-bold handwritten">左滑删除</span>
                            <span class="material-symbols-outlined text-red-400 text-sm">delete_forever</span>
                        </div>
                        <span class="material-symbols-outlined text-white text-4xl sketch-arrow">west</span>
                    </div>
                    <!-- Right Arrow & Label -->
                    <div class="absolute -right-20 top-1/2 -translate-y-1/2 flex items-center">
                        <span class="material-symbols-outlined text-white text-4xl sketch-arrow">east</span>
                        <div class="flex flex-col items-start ml-2">
                            <span class="text-white text-lg font-bold handwritten">右滑珍藏</span>
                            <span class="material-symbols-outlined text-yellow-400 text-sm">auto_awesome</span>
                        </div>
                    </div>
                </div>
                <!-- Friendly Hand-drawn Mascot Icon -->
                <div class="absolute -bottom-8 -right-4 rotate-12">
                    <div class="bg-[#fdfbf7] p-3 rounded-full shadow-lg border-2 border-primary/30">
                        <span class="material-symbols-outlined text-primary text-4xl">face_6</span>
                    </div>
                </div>
            </div>
            <!-- Bottom Action -->
            <div class="w-full max-w-xs flex flex-col items-center gap-6">
                <div class="flex items-center gap-2 text-white/70 text-sm handwritten">
                    <span class="material-symbols-outlined text-xs">draw</span>
                    <span>随心滑动，让相册保持整洁</span>
                </div>
                <button
                    class="w-full py-4 paper-texture rounded-xl shadow-[0_4px_0_0_#d1d5db] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-3 group">
                    <span class="text-slate-800 font-bold text-xl tracking-widest handwritten">开始体验</span>
                    <span
                        class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">magic_button</span>
                </button>
            </div>
        </div>
        <!-- Bottom Sheet Handle (Visual element only) -->
        <div class="absolute bottom-0 left-0 w-full z-20 flex flex-col items-center pointer-events-none">
            <div class="w-12 h-1.5 bg-white/30 rounded-full mb-3"></div>
        </div>
    </div>
</body>

</html>
