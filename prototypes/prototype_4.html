<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Serif+SC:wght@300;400;500;600;700&amp;family=Zhi+Mang+Xing&amp;family=Ma+Shan+Zheng&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "scrapbook-cream": "#F5F5DC",
                        "scrapbook-brown": "#5D4037",
                        "scrapbook-accent": "#D4A373"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Serif SC", "serif"],
                        "handwriting": ["Zhi Mang+Xing", "cursive"],
                        "serif-sc": ["Noto Serif SC", "serif"],
                        "elegant-hand": ["Ma Shan Zheng", "cursive"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .dotted-bg {
            background-image: radial-gradient(#d1d1b2 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .washi-tape {
            background: rgba(236, 91, 19, 0.3);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            transform: rotate(-3deg);
        }

        .washi-tape-green {
            background: rgba(101, 163, 13, 0.3);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .washi-tape-blue {
            background: rgba(56, 189, 248, 0.3);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .washi-tape-pink {
            background: rgba(244, 114, 182, 0.3);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #F5F5DC;
        }

        ::-webkit-scrollbar-thumb {
            background: #D4A373;
            border-radius: 4px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-scrapbook-brown">

                                    <span class="material-symbols-outlined text-3xl">eco</span>
                                </div>

                                </div>

                                    </div>

                                </div>

                                    class="absolute -top-4 -right-2 material-symbols-outlined text-yellow-400 text-xl drop-shadow-sm rotate-12 animate-pulse">wb_sunny</span>
                            </div>
                            <div
                                class="relative transform rotate-[4deg] hover:rotate-0 transition-transform duration-300 z-10 -mt-2">

                                    class="absolute -top-3 left-[15%] w-12 h-4 washi-tape-blue rotate-[2deg] z-20 opacity-90">

                                    </div>

                                </div>
                            </div>
                            <div
                                class="relative transform rotate-[-2deg] hover:rotate-0 transition-transform duration-300 z-20 mt-4">
                                <div
                                    class="absolute -top-3 right-[25%] w-12 h-4 washi-tape bg-yellow-400/30 rotate-[-3deg] z-20 opacity-90">
                                </div>
                                <div class="bg-white p-2 pb-6 shadow-lg border border-slate-100">
                                    <div class="w-full aspect-[4/5] bg-cover bg-center"

                                </div>
                            </div>
                        </div>
                        <div class="mt-auto pt-6 border-t-2 border-dotted border-gray-300 relative">
                            <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-2">
                                <span class="material-symbols-outlined text-gray-400">content_cut</span>
                            </div>
                            <div class="flex flex-col items-center justify-center gap-3 text-center w-full px-2">
                                <div
                                    class="w-full bg-scrapbook-cream/50 rounded-lg p-3 border border-dashed border-scrapbook-brown/20 flex items-center justify-between gap-3">
                                    <div class="flex items-center gap-2">
                                        <div
                                            class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                                            <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                                        </div>

                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3 text-right">

                                        <div class="w-px h-6 bg-gray-300"></div>
                                        <div class="flex flex-col items-end">
                                            <span class="text-[10px] text-gray-500">清理空间</span>
                                            <span class="text-sm font-bold text-primary">12.5 MB</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-6 pb-6">
                <div
                    class="mt-4 flex items-center justify-between bg-white/60 p-4 rounded-xl border border-scrapbook-accent/10 backdrop-blur-sm shadow-sm">
                    <div class="flex items-center gap-3">
                        <div
                            class="flex size-10 items-center justify-center rounded-full bg-scrapbook-accent/20 text-scrapbook-brown">
                            <span class="material-symbols-outlined text-lg">calendar_today</span>
                        </div>
                        <div>
                            <p class="text-xs text-scrapbook-brown/60">记录时间</p>
                            <p class="text-sm font-bold text-scrapbook-brown">2024年3月15日</p>
                        </div>
                    </div>
                    <div
                        class="flex items-center gap-1 bg-white/50 px-3 py-1.5 rounded-full border border-scrapbook-brown/5 shadow-sm">
                        <span class="material-symbols-outlined text-xs text-primary">location_on</span>
                        <span class="text-xs text-gray-600 font-medium">CozyClean</span>
                    </div>
                </div>
            </div>

        <div
            class="bg-scrapbook-cream/95 backdrop-blur-md border-t border-scrapbook-accent/20 pb-6 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            <div class="flex items-center gap-3 px-6 pt-4">
                <button
                    class="flex-1 flex flex-col items-center justify-center gap-1 h-14 bg-white border border-scrapbook-brown/10 text-scrapbook-brown rounded-2xl hover:bg-scrapbook-accent/5 transition-colors shadow-sm">
                    <span class="material-symbols-outlined text-[22px]">edit</span>
                    <span class="text-[10px] font-medium">编辑</span>
                </button>
                <button
                    class="flex-1 flex flex-col items-center justify-center gap-1 h-14 bg-white border border-scrapbook-brown/10 text-scrapbook-brown rounded-2xl hover:bg-scrapbook-accent/5 transition-colors shadow-sm">

                    <span class="text-[10px] font-medium">返回首页</span>

                    <span class="material-symbols-outlined text-[22px]">delete</span>

                </button>
            </div>
            <div class="px-6 pt-3">

                </button>
