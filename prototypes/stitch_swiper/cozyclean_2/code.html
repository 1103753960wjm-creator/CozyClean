<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8B5E3C",
                        "secondary": "#A67B5B",
                        "accent": "#D2B48C",
                        "background-light": "#F5F5DC",
                        "background-dark": "#2C241B",
                        "paper": "#FDFBF7",
                        "text-main": "#4A3B32",
                        "text-muted": "#8C7A6B",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"],
                        "body": ["Noto Sans SC", "sans-serif"],
                        "handwritten": ["Ma Shan Zheng", "cursive"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem", 
                        "lg": "1.5rem", 
                        "xl": "2rem", 
                        "full": "9999px"

                    boxShadow: {
                        "paper": "0 4px 6px -1px rgba(139, 94, 60, 0.1), 0 2px 4px -1px rgba(139, 94, 60, 0.06)",

                    animation: {
                        'float-up': 'floatUp 6s ease-in-out infinite',
                        'float-down': 'floatDown 6s ease-in-out infinite',
                        'twinkle': 'twinkle 3s ease-in-out infinite',
                    },
                    keyframes: {
                        floatUp: {
                            '0%, 100%': { transform: 'translateY(0) rotate(-3deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(2deg)' },
                        },
                        floatDown: {
                            '0%, 100%': { transform: 'translateY(0) rotate(2deg)' },
                            '50%': { transform: 'translateY(10px) rotate(-1deg)' },
                        },
                        twinkle: {
                            '0%, 100%': { opacity: 0.6, transform: 'scale(1)' },
                            '50%': { opacity: 1, transform: 'scale(1.2)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        .bg-texture {
            background-image: radial-gradient(#D2B48C 1px, transparent 1px);
            background-size: 20px 20px;

        }
