<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Serif+SC:wght@300;400;500;600;700&amp;family=Zhi+Mang+Xing&amp;family=Ma+Shan+Zheng&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "scrapbook-cream": "#F5F5DC",
                        "scrapbook-brown": "#5D4037",
                        "scrapbook-accent": "#D4A373",
                        "paper-texture": "#FDFBF7"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Serif SC", "serif"],
                        "handwriting": ["Zhi Mang+Xing", "cursive"],
                        "handwriting-title": ["Ma Shan Zheng", "cursive"],
                        "serif-sc": ["Noto Serif SC", "serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    boxShadow: {
                        'paper': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.02)',
                        'polaroid': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        }
    </script>
    <style>
        .dotted-bg {
            background-image: radial-gradient(#d1d1b2 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .washi-tape {
            background-color: rgba(236, 91, 19, 0.3);
            background-image: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.3) 10px,
                    rgba(255, 255, 255, 0.3) 20px);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            mask-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,0 L100,0 L98,100 L2,100 Z' fill='black'/%3E%3C/svg%3E");
        }

        .paper-texture {
            background-color: #FDFBF7;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #F5F5DC;
        }

        ::-webkit-scrollbar-thumb {
            background: #D4A373;
            border-radius: 4px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-scrapbook-brown">
    <div
        class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-scrapbook-cream shadow-2xl overflow-x-hidden dotted-bg">
        <nav
            class="flex items-center p-4 justify-between bg-scrapbook-cream/95 backdrop-blur-sm sticky top-0 z-50 border-b border-scrapbook-accent/20">
            <button
                class="flex size-10 items-center justify-center rounded-full hover:bg-scrapbook-accent/10 transition-colors">
                <span class="material-symbols-outlined text-scrapbook-brown">arrow_back_ios_new</span>
            </button>
            <h2 class="text-scrapbook-brown text-lg font-bold leading-tight tracking-tight">单页海报预览</h2>
            <button
                class="flex size-10 items-center justify-center rounded-full hover:bg-scrapbook-accent/10 transition-colors">
                <span class="material-symbols-outlined text-scrapbook-brown">share</span>
            </button>
        </nav>
        <main class="flex-1 overflow-y-auto pb-20">
            <div class="px-6 pt-6 pb-2">
                <div
                    class="relative w-full bg-white paper-texture shadow-paper rounded-sm p-8 overflow-hidden border border-scrapbook-accent/10 min-h-[700px] flex flex-col">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-32 h-8 washi-tape z-20 opacity-90 rotate-1">
                    </div>
                    <div class="absolute top-[10%] -right-8 w-24 h-24 bg-yellow-500/5 rounded-full blur-2xl z-0"></div>
                    <div
                        class="absolute bottom-[20%] -left-8 w-32 h-32 bg-scrapbook-accent/5 rounded-full blur-2xl z-0">
                    </div>
                    <div class="relative z-10 flex flex-col items-center h-full">
                        <div class="text-center w-full mb-8 pt-4">
                            <h1 class="font-handwriting-title text-3xl text-scrapbook-brown mb-3 tracking-wider">美好的瞬间
                            </h1>
                            <div class="relative inline-block">
                                <p
                                    class="font-handwriting text-lg text-scrapbook-accent/90 px-6 py-1 leading-relaxed text-center">
                                    "时光会走远，影像会长存。<br />这是我们珍贵的回忆。"
                                </p>
                                <span
                                    class="material-symbols-outlined absolute -top-2 -left-2 text-scrapbook-accent/40 text-sm rotate-12">format_quote</span>
                                <span
                                    class="material-symbols-outlined absolute -bottom-2 -right-2 text-scrapbook-accent/40 text-sm rotate-12">format_quote</span>
                            </div>
                        </div>
                        <div class="relative w-full mb-10 group perspective-1000">
                            <div
                                class="absolute -top-3 left-1/2 -translate-x-1/2 w-24 h-6 washi-tape z-30 opacity-80 rotate-[-2deg]">
                            </div>
                            <div class="absolute -bottom-4 -right-2 z-30 transform rotate-12 drop-shadow-md">
                                <span
                                    class="material-symbols-outlined text-red-400/80 text-5xl fill-current">favorite</span>
                            </div>
                            <div
                                class="bg-white p-4 pb-12 shadow-polaroid border border-gray-100 rotate-1 transform transition-transform duration-500 hover:rotate-0 hover:scale-[1.01]">
                                <div class="w-full aspect-[3/4] bg-gray-100 overflow-hidden relative">
                                    <div class="absolute inset-0 bg-cover bg-center"
                                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBvyTNzX84QW04IicKngKABUzAaoSvoPJl-dCjlTy0pd8RwD8JnQsTbGPd6Mv86K_MwOMucQmBI26BLqcrPmWyKzbShvimIY1zGrOzAYW7kBaW_YZM9LC82SeM82axbcMf9ZE5bEFrLtyKv_Wts8uhI4sFcDjbqFAWkxYUSF-lmcVj4OzjRqXYsy5cmJ-N_HooSMIB6lSAyjzDyUWjGAEU7QcBBjLJHmJHExuHRPyKRTnCadKqUvc5R62GC5Hwo4Vlpc3KlmKkVQfXJ");'>
                                    </div>
                                    <div
                                        class="absolute inset-0 bg-gradient-to-t from-black/10 via-transparent to-transparent opacity-50">
                                    </div>
                                </div>
                                <div class="mt-4 flex justify-between items-end px-1">
                                    <p class="font-handwriting text-gray-500 text-xl pl-2">My Little Treasure</p>
                                    <p class="font-mono text-xs text-gray-300">#2024</p>
                                </div>
                            </div>
                        </div>
                        <div class="mt-auto w-full pt-8 relative">
                            <div class="bg-scrapbook-cream/40 rounded-xl p-4 border border-scrapbook-brown/10 mb-6">
                                <div class="flex items-center gap-2 mb-3 justify-center">
                                    <span
                                        class="material-symbols-outlined text-scrapbook-brown text-sm">auto_awesome</span>
                                    <h3 class="font-serif-sc font-medium text-scrapbook-brown text-sm">记忆碎片整理</h3>
                                </div>
                                <div
                                    class="flex justify-between items-center text-center divide-x divide-scrapbook-brown/10">
                                    <div class="flex-1 px-2">
                                        <p class="text-xs text-scrapbook-brown/60 mb-1 font-serif-sc">保留照片 1 张</p>
                                    </div>
                                    <div class="flex-1 px-2">
                                        <p class="text-xs font-bold text-primary mb-1">清理空间 45 MB</p>
                                    </div>
                                </div>
                            </div>
                            <div class="text-center">
                                <p class="font-display text-[10px] text-scrapbook-brown/40 tracking-[0.2em] uppercase">
                                    GENERATED BY COZYCLEAN</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="px-6 mt-4 pb-8 space-y-4">
                <div
                    class="flex items-center justify-between bg-white/60 p-4 rounded-xl border border-scrapbook-accent/10 backdrop-blur-sm shadow-sm">
                    <div class="flex items-center gap-3">
                        <div
                            class="flex size-10 items-center justify-center rounded-full bg-scrapbook-accent/20 text-scrapbook-brown">
                            <span class="material-symbols-outlined text-lg">calendar_today</span>
                        </div>
                        <div>
                            <p class="text-xs text-scrapbook-brown/60">记录时间</p>
                            <p class="text-sm font-bold text-scrapbook-brown">2024年3月15日</p>
                        </div>
                    </div>
                    <div class="flex size-10 items-center justify-center rounded-full bg-pink-50 text-pink-400">
                        <span class="material-symbols-outlined text-xl fill-current">favorite</span>
                    </div>
                </div>
                <div class="grid grid-cols-[1fr_1fr_2fr_1fr] gap-2">
                    <button
                        class="flex flex-col items-center justify-center h-16 bg-white border border-scrapbook-brown/20 text-scrapbook-brown rounded-xl hover:bg-scrapbook-accent/10 transition-colors shadow-sm">
                        <span class="material-symbols-outlined text-xl mb-0.5">edit</span>
                        <span class="text-[10px] font-medium">编辑</span>
                    </button>
                    <button
                        class="flex flex-col items-center justify-center h-16 bg-white border border-scrapbook-brown/20 text-scrapbook-brown rounded-xl hover:bg-scrapbook-accent/10 transition-colors shadow-sm">
                        <span class="material-symbols-outlined text-xl mb-0.5">home</span>
                        <span class="text-[10px] font-medium">返回首页</span>
                    </button>
                    <button
                        class="flex flex-col items-center justify-center h-16 bg-scrapbook-brown text-scrapbook-cream rounded-xl font-bold shadow-md active:scale-95 transition-transform hover:bg-scrapbook-brown/90 px-1">
                        <span class="material-symbols-outlined text-xl mb-0.5">ios_share</span>
                        <span class="text-[10px] font-medium leading-tight text-center">分享至<br />社交媒体</span>
                    </button>
                    <button
                        class="flex flex-col items-center justify-center h-16 bg-white border border-red-100 text-red-400 rounded-xl hover:bg-red-50 transition-colors shadow-sm">
                        <span class="material-symbols-outlined text-xl mb-0.5">delete</span>
                        <span class="text-[10px] font-medium">删除</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
