<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Noto+Serif+SC:wght@300;400;500;600;700&amp;family=Zhi+Mang+Xing&amp;family=Ma+Shan+Zheng&amp;display=swap"

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "scrapbook-cream": "#F5F5DC",
                        "scrapbook-brown": "#5D4037",
                        "scrapbook-accent": "#D4A373",
                        "tape-pink": "#F8C8DC",
                        "tape-blue": "#AEC6CF",
                        "tape-green": "#C1E1C1"

                    fontFamily: {
                        "display": ["Public Sans", "Noto Serif SC", "serif"],
                        "handwriting": ["Zhi Mang+Xing", "cursive"],
                        "serif-sc": ["Noto Serif SC", "serif"],
                        "elegant-hand": ["Ma Shan Zheng", "cursive"]

                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    boxShadow: {

    <style>
        .dotted-bg {
            background-image: radial-gradient(#d1d1b2 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .washi-tape {
            background: rgba(236, 91, 19, 0.3);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .tape-pattern-1 {
            background: repeating-linear-gradient(45deg, #F8C8DC, #F8C8DC 10px, #ffffff 10px, #ffffff 20px);
            opacity: 0.8;
        }

        .tape-pattern-2 {
            background-color: #AEC6CF;
            background-image: radial-gradient(#ffffff 20%, transparent 20%);
            background-size: 8px 8px;
            opacity: 0.8;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #F5F5DC;
        }

        ::-webkit-scrollbar-thumb {
            background: #D4A373;
            border-radius: 4px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
