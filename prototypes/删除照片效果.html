<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Photo Cleaning Page - Delete Interaction</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;family=Caveat:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8B5E3C",
                        "secondary": "#A67B5B",
                        "accent": "#D2B48C",
                        "background-light": "#F5F5DC",
                        "background-dark": "#2C241B",
                        "paper": "#FDFBF7",
                        "text-main": "#4A3B32",
                        "text-muted": "#8C7A6B",
                        "action-red": "#E57373",
                        "action-green": "#81C784",
                        "action-yellow": "#FFD54F",
                        "action-blue": "#64B5F6"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"],
                        "body": ["Noto Sans SC", "sans-serif"],
                        "hand": ["Caveat", "cursive"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "polaroid": "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02)",
                        "glow-red": "0 0 15px rgba(229, 115, 115, 0.5)",
                    },
                    backgroundImage: {
                        'dot-pattern': 'radial-gradient(#D2B48C 1.5px, transparent 1.5px)',
                    }
                },
            },
        }
    </script>
    <style>
        .bg-texture {
            background-size: 24px 24px;
            opacity: 0.4;
        }

        .rotate-slight-right {
            transform: rotate(2deg);
        }

        .rotate-slight-left {
            transform: rotate(-1deg);
        }

        .hand-border {
            border-radius: 2px 255px 3px 25px / 255px 5px 225px 3px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .stamp-texture {
            mask-image: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
            mask-size: 100px;
            -webkit-mask-size: 100px;
        }

        .ink-border {
            border: 4px solid #E57373;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px rgba(229, 115, 115, 0.4);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-body text-text-main dark:text-[#E8DCC4] min-h-screen flex flex-col overflow-hidden transition-colors duration-300">
    <div class="fixed inset-0 bg-dot-pattern bg-texture pointer-events-none z-0"></div>
    <div
        class="fixed inset-y-0 left-0 w-1/3 bg-gradient-to-r from-red-100/40 to-transparent pointer-events-none z-0 transition-opacity duration-300">
    </div>
    <main class="relative z-10 flex-1 flex flex-col h-full">
        <header class="flex items-center justify-between px-6 pt-12 pb-2">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-paper/50 hover:bg-white transition-colors text-text-muted">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="flex flex-col items-end">
                <div class="flex items-baseline gap-1 font-hand text-2xl text-text-main rotate-slight-left">
                    <span class="font-bold text-3xl">1</span>
                    <span class="text-xl text-text-muted">/</span>
                    <span class="text-xl text-text-muted">50</span>
                </div>
                <div
                    class="flex items-center gap-1 text-sm font-hand text-action-yellow font-bold rotate-slight-right -mt-1">
                    <span class="material-symbols-outlined filled-icon text-[14px]">star</span>
                    <span>1/4</span>
                </div>
            </div>
        </header>
        <section class="flex-1 flex flex-col items-center justify-center relative w-full max-w-md mx-auto px-6 py-4">
            <div
                class="absolute inset-0 pointer-events-none flex flex-col justify-between items-center py-20 px-8 z-0 opacity-20">
                <div
                    class="text-action-yellow font-hand text-lg font-bold flex flex-col items-center transform -translate-y-4">
                    <span class="material-symbols-outlined text-4xl mb-1">star</span>
                    <span>上滑高光</span>
                </div>
                <div class="w-full flex justify-between items-center transform -translate-y-8">
                    <div
                        class="text-action-red font-hand text-lg font-bold flex flex-col items-center -ml-4 scale-110 opacity-100">
                        <span class="material-symbols-outlined text-4xl mb-1">delete</span>
                        <span>左滑删除</span>
                    </div>
                    <div class="text-action-green font-hand text-lg font-bold flex flex-col items-center -mr-4">
                        <span class="material-symbols-outlined text-4xl mb-1">favorite</span>
                        <span>右滑珍藏</span>
                    </div>
                </div>
                <div
                    class="text-action-blue font-hand text-lg font-bold flex flex-col items-center transform translate-y-4">
                    <span>下滑稍后</span>
                    <span class="material-symbols-outlined text-4xl mt-1">arrow_downward</span>
                </div>
            </div>
            <div
                class="absolute w-[85%] aspect-[3/4] bg-white rounded-lg shadow-sm transform scale-90 translate-y-8 rotate-3 border border-stone-200 z-10">
            </div>
            <div
                class="absolute w-[88%] aspect-[3/4] bg-white rounded-lg shadow-sm transform scale-95 translate-y-4 -rotate-2 border border-stone-200 z-20">
            </div>
            <div
                class="relative w-full aspect-[3/4] bg-white p-4 pb-12 shadow-polaroid transform -translate-x-24 -rotate-12 blur-[0.5px] z-30 transition-all duration-300 hand-border group">
                <div class="w-full h-full bg-stone-100 overflow-hidden relative hand-border">
                    <img alt="Memory Photo" class="w-full h-full object-cover sepia-[.15]"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvvyeTzA0pthiGxJ-zeNjWLfpa3kxcnC4gkLu6zfBKgCslGHXqfpmwm4RqIFoW6sNzG3woQ2JxvYcsYCrHrSxGQIJI_lpIyrv8bp1BCtmRZfL9wY8FzXPzdL4l5cpOjFn3hKwdiOIi2qaq-cJiL512ESd_WN1JuPqzZq64BE8EoH_cSvP6zW3f6qBmNOlLF6fHvAQmkxpQZP0HdVAOHZFq6LBAtEZHYI-f2EOR1UBPdyD2PJwY5YOf7fWkqtgEPMWD_gPz3p6OYJAb" />
                    <div
                        class="absolute bottom-3 right-3 bg-black/50 text-white/90 text-xs px-2 py-1 rounded font-mono backdrop-blur-sm">
                        2023.05.20
                    </div>
                    <div class="absolute inset-0 flex items-center justify-center bg-black/10 backdrop-grayscale-[0.5]">
                        <div class="w-40 h-40 border-[6px] border-action-red rounded-full flex flex-col items-center justify-center transform -rotate-12 opacity-90 stamp-texture mix-blend-multiply bg-white/10 backdrop-blur-[1px]"
                            style="border-radius: 45% 55% 40% 60% / 55% 45% 60% 40%;">
                            <div class="absolute inset-0 border-[2px] border-action-red rounded-full opacity-60 scale-95"
                                style="border-radius: 50% 50% 55% 45% / 45% 60% 40% 55%;"></div>
                            <span
                                class="material-symbols-outlined text-action-red text-6xl opacity-90 mb-1">delete</span>
                            <span
                                class="text-action-red font-hand font-black text-3xl uppercase tracking-widest leading-none transform scale-y-90">DELETE</span>
                            <span class="text-action-red font-body font-bold text-sm tracking-widest mt-1">删除</span>
                        </div>
                    </div>
                </div>
                <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-32 h-8 bg-[#E6DCC8] opacity-90 shadow-sm rotate-1 z-40 flex items-center justify-center"
                    style="clip-path: polygon(2% 0%, 98% 5%, 100% 100%, 0% 95%);">
                    <div class="w-full h-full opacity-30 bg-repeat-x"
                        style="background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, #fff 2px, #fff 4px);">
                    </div>
                </div>
            </div>
        </section>
        <section class="px-6 pb-32 pt-6 w-full max-w-md mx-auto">
            <div class="flex items-center justify-between">
                <button class="flex flex-col items-center gap-2 group min-w-[3.5rem]">
                    <div
                        class="w-12 h-12 rounded-full bg-paper border border-[#E8DCC4] flex items-center justify-center shadow-sm group-active:scale-95 transition-transform hover:bg-stone-50">
                        <span class="material-symbols-outlined text-text-muted text-[24px]">undo</span>
                    </div>
                    <span class="text-xs font-medium text-text-muted">撤销</span>
                </button>
                <button class="flex flex-col items-center gap-2 group min-w-[3.5rem] -mt-2">
                    <div
                        class="w-16 h-16 rounded-full bg-action-red border-2 border-red-200 flex items-center justify-center shadow-glow-red group-active:scale-95 transition-transform scale-105">
                        <span class="material-symbols-outlined text-white text-[32px]">delete</span>
                    </div>
                    <span class="text-xs font-bold text-action-red">删除</span>
                </button>
                <button class="flex flex-col items-center gap-2 group min-w-[3.5rem] opacity-50">
                    <div
                        class="w-12 h-12 rounded-full bg-paper border border-[#E8DCC4] flex items-center justify-center shadow-sm group-active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-text-muted text-[24px]">arrow_downward</span>
                    </div>
                    <span class="text-xs font-medium text-text-muted">稍后</span>
                </button>
                <button class="flex flex-col items-center gap-2 group min-w-[3.5rem] opacity-50">
                    <div
                        class="w-12 h-12 rounded-full bg-paper border border-[#E8DCC4] flex items-center justify-center shadow-sm group-active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-text-muted text-[24px]">star</span>
                    </div>
                    <span class="text-xs font-medium text-text-muted">高光</span>
                </button>
                <button class="flex flex-col items-center gap-2 group min-w-[3.5rem] opacity-50">
                    <div
                        class="w-12 h-12 rounded-full bg-paper border border-[#E8DCC4] flex items-center justify-center shadow-sm group-active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-text-muted text-[24px]">favorite</span>
                    </div>
                    <span class="text-xs font-medium text-text-muted">珍藏</span>
                </button>
            </div>
        </section>
    </main>
    <nav class="fixed bottom-0 left-0 w-full z-50">
        <div
            class="absolute inset-0 bg-white/80 dark:bg-[#2C241B]/90 backdrop-blur-md border-t border-[#E8DCC4]/50 dark:border-white/5">
        </div>
        <div class="relative flex justify-between items-end px-6 pb-6 pt-3 max-w-md mx-auto">
            <a class="flex flex-col items-center justify-center gap-1 w-16 group opacity-60 hover:opacity-100 transition-opacity"
                href="#">
                <div class="p-2">
                    <span class="material-symbols-outlined text-text-main dark:text-[#E8DCC4] text-[28px]">home</span>
                </div>
                <span class="text-xs font-medium text-text-main dark:text-[#E8DCC4]">首页</span>
            </a>
            <a class="flex flex-col items-center justify-center gap-1 w-16 group opacity-60 hover:opacity-100 transition-opacity"
                href="#">
                <div class="p-2">
                    <span
                        class="material-symbols-outlined text-text-main dark:text-[#E8DCC4] text-[28px]">menu_book</span>
                </div>
                <span class="text-xs font-medium text-text-main dark:text-[#E8DCC4]">手账</span>
            </a>
            <a class="flex flex-col items-center justify-center gap-1 w-16 group opacity-60 hover:opacity-100 transition-opacity"
                href="#">
                <div class="p-2">
                    <span class="material-symbols-outlined text-text-main dark:text-[#E8DCC4] text-[28px]">person</span>
                </div>
                <span class="text-xs font-medium text-text-main dark:text-[#E8DCC4]">我的</span>
            </a>
        </div>
    </nav>
</body>

</html>
